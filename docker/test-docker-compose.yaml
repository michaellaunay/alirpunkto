# =============================================================================
# docker/test-docker-compose.yaml — AlirPunkto local/offline test stack
#
# Run from the repository root, after ./docker/init_test.sh:
#
#   docker compose --env-file docker/.env.test -f docker/test-docker-compose.yaml up -d --build
#   docker compose --env-file docker/.env.test -f docker/test-docker-compose.yaml logs -f
#   docker compose --env-file docker/.env.test -f docker/test-docker-compose.yaml down
#
# Intent:
# - separate container names, volumes and network from the production compose file;
# - local HTTPS with a self-signed certificate generated by docker/init_test.sh;
# - no Certbot and no Let's Encrypt request;
# - Postfix configured as a local SMTP sink: it accepts messages but never relays them;
# - internal Docker network to prevent containers from reaching the Internet at runtime.
# =============================================================================

services:

  ldap:
    build:
      context: .
      dockerfile: DockerfileOpenLDAP
      args:
        BUILD_WITH_DEBUG: ${BUILD_WITH_DEBUG:-1}
    image: alirpunkto-test-ldap
    container_name: alirpunkto-test-ldap
    restart: "no"
    networks:
      - alirpunkto-test-net
    ports:
      # Host-side debug access only. The application itself uses the internal port 389.
      - "127.0.0.1:18389:389"
      - "127.0.0.1:18636:636"
    environment:
      LDAP_BASE_DN: ${LDAP_BASE_DN}
      LDAP_ORGANIZATION: ${LDAP_ORGANIZATION}
      LDAP_PASSWORD_FILE: /run/secrets/ldap_password
      INITIAL_USERS_LDIF: /initials_users.test.generated.ldif
      DEBUG_LDAP: ${DEBUG_LDAP:-true}
      SKIP_INITIAL_LDAP: ${SKIP_INITIAL_LDAP:-false}
    secrets:
      - ldap_password
    volumes:
      - alirpunkto_test_ldap_etc:/etc/ldap
      - alirpunkto_test_ldap_var:/var/lib/ldap
      - ../alirpunkto/alirpunkto_schema.ldif:/schema/alirpunkto_schema.ldif:ro
      - ./initials_users.test.generated.ldif:/initials_users.test.generated.ldif:ro
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-s", "base", "-b", ""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s

  postfix:
    build:
      context: .
      dockerfile: DockerfilePostfix
    image: alirpunkto-test-postfix
    container_name: alirpunkto-test-postfix
    restart: "no"
    networks:
      - alirpunkto-test-net
    ports:
      # Optional debug SMTP endpoint from the host.
      - "127.0.0.1:19025:25"
    environment:
      DOMAIN: ${DOMAIN}
      POSTFIX_MYHOSTNAME: ${POSTFIX_MYHOSTNAME}
      POSTFIX_INET_PROTOCOLS: ${POSTFIX_INET_PROTOCOLS:-ipv4}
      POSTFIX_MESSAGE_SIZE_LIMIT: ${POSTFIX_MESSAGE_SIZE_LIMIT:-26214400}
      POSTFIX_TEST_MODE: "true"
      POSTFIX_DISABLE_EXTERNAL_DELIVERY: "true"
      POSTFIX_RELAYHOST: ""
    volumes:
      - alirpunkto_test_postfix_spool:/var/spool/postfix
      - alirpunkto_test_postfix_dkim:/etc/dkimkeys
      - ./start_test_postfix.sh:/usr/local/bin/start_test_postfix.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/start_test_postfix.sh"]
    healthcheck:
      test: ["CMD", "sh", "-c", "ss -ltn | grep -q ':25'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 15s

  pyramid:
    build:
      context: ..
      dockerfile: docker/DockerfilePyramid
      args:
        BUILD_WITH_DEBUG: ${BUILD_WITH_DEBUG:-1}
    image: alirpunkto-test-pyramid
    container_name: alirpunkto-test-pyramid
    restart: "no"
    networks:
      - alirpunkto-test-net
    ports:
      # Direct debug access to Waitress, bypassing Apache.
      - "127.0.0.1:16543:6543"
    environment:
      BUILD_WITH_DEBUG: ${BUILD_WITH_DEBUG:-1}
      APP_HOME: /home/alirpunkto/app
      VENV_DIR: /home/alirpunkto/venv
      LDAP_SERVER: alirpunkto-test-ldap
      LDAP_PORT: 389
      LDAP_USE_SSL: "false"
      MAIL_SERVER: alirpunkto-test-postfix
      MAIL_HOST: alirpunkto-test-postfix
      MAIL_PORT: 25
      MAIL_TLS: "false"
      MAIL_SSL: "false"
      DISABLE_EMAIL_MX_CHECKS: ${DISABLE_EMAIL_MX_CHECKS:-true}
      INSTALL_EXTRAS_TESTING: ${INSTALL_EXTRAS_TESTING:-true}
    volumes:
      - alirpunkto_test_pyramid_var:/home/alirpunkto/app/var
      - ./.env.test:/home/alirpunkto/app/.env:ro
      - ../test.ini:/home/alirpunkto/app/test.ini:ro
      - ./start_test_pyramid.sh:/usr/local/bin/start_test_pyramid.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/start_test_pyramid.sh"]
    command: ["test.ini"]
    depends_on:
      ldap:
        condition: service_healthy
      postfix:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket, urllib.request; ip = socket.gethostbyname(socket.gethostname()); urllib.request.urlopen('http://%s:6543/' % ip, timeout=5)\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  apache2:
    build:
      context: .
      dockerfile: DockerfileApache2
    image: alirpunkto-test-apache2
    container_name: alirpunkto-test-apache2
    restart: "no"
    networks:
      - alirpunkto-test-net
    ports:
      # Avoid collision with a local Apache/Nginx or the production stack.
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    environment:
      APACHE_SERVER_NAME: ${APACHE_SERVER_NAME}
      APACHE_SERVER_ALIASES: ${APACHE_SERVER_ALIASES:-localhost alirpunkto.local 127.0.0.1}
      APACHE_BACKEND_HOST: alirpunkto-test-pyramid
      APACHE_BACKEND_PORT: 6543
      ENABLE_CERTBOT: "false"
      TEST_TLS_CERT: /etc/ssl/alirpunkto-test/fullchain.pem
      TEST_TLS_KEY: /etc/ssl/alirpunkto-test/privkey.pem
      HTTP_PORT: 80
      HTTPS_PORT: 443
    volumes:
      - ./certs/local-test:/etc/ssl/alirpunkto-test:ro
      - ./start_test_apache2.sh:/usr/local/bin/start_test_apache2.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/start_test_apache2.sh"]
    depends_on:
      pyramid:
        condition: service_healthy

volumes:
  alirpunkto_test_ldap_etc:
  alirpunkto_test_ldap_var:
  alirpunkto_test_postfix_spool:
  alirpunkto_test_postfix_dkim:
  alirpunkto_test_pyramid_var:

networks:
  alirpunkto-test-net:
    name: alirpunkto-test-net
    driver: bridge

secrets:
  ldap_password:
    file: ./secrets/ldap_password_test
